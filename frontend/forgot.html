<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Forgot Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>body{background:#0f172a;color:#e2e8f0;padding:20px;font-family:Segoe UI,system-ui;} .card{max-width:640px;margin:40px auto;padding:24px;border-radius:12px;background:rgba(15,23,42,0.95);border:1px solid #334155}</style>
</head>
<body>
  <div class="card">
    <h3>Reset your password</h3>
    <p class="text-muted">Enter the email you used to register. We'll send a password-reset link — open it to set a new password.</p>

    <div id="notice" class="mb-2"></div>

    <div id="form-area">
      <label class="form-label">Email</label>
      <input id="fp-email" class="form-control" placeholder="you@example.com">
      <div style="height:10px"></div>
      <button id="btn-send" class="btn btn-primary">Send reset email</button>
      <button id="btn-help" class="btn btn-link">Why am I not getting email?</button>
    </div>

    <div id="status" style="margin-top:12px;display:none"></div>
    <div style="margin-top:12px"><a href="login.html">Back to login</a></div>
  </div>

  <script type="importmap">
    {"imports": {"firebase/app":"https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js","firebase/auth":"https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js"}}
  </script>

  <script type="module">
    import { initializeApp } from 'firebase/app';
    import { getAuth, fetchSignInMethodsForEmail, sendPasswordResetEmail } from 'firebase/auth';

    const statusEl = document.getElementById('status');
    const noticeEl = document.getElementById('notice');
    function showStatus(msg, kind='info'){
      statusEl.style.display='block';
      statusEl.innerText = msg;
      statusEl.className = (kind==='error')? 'text-danger': (kind==='success')? 'text-success':'text-muted';
    }
    function clearStatus(){ statusEl.style.display='none'; statusEl.innerText=''; }

    // Helpful check: running from file:// will break redirects and some CORS flows
    if(window.location.protocol === 'file:'){
      noticeEl.innerHTML = '<div class="alert alert-warning">Serving pages via <strong>file://</strong> can prevent Firebase redirects from working. Run a local HTTP server (see Help) and reload this page.</div>';
    }

    // Use same firebase config as other pages
    const firebaseConfig = {
      apiKey: "AIzaSyD4Nhmq0DlMnIuG6oWOfoTAnUeWN37Ym74",
      authDomain: "newapp-f2106.firebaseapp.com",
      projectId: "newapp-f2106",
      storageBucket: "newapp-f2106.appspot.com",
      messagingSenderId: "372249829739",
      appId: "1:372249829739:web:98d193f53370ef52002c2e",
      measurementId: "G-QXF0B0VMGN",
      databaseURL: "https://newapp-f2106-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // click handler
    const btn = document.getElementById('btn-send');
    document.getElementById('btn-send').addEventListener('click', async ()=>{
      clearStatus(); const email = document.getElementById('fp-email').value?.trim();
      if(!email){ showStatus('Please enter your email','error'); return; }
      btn.disabled = true; btn.innerText = 'Sending...';
      try{
        // check account exists (friendly UX)
        const methods = await fetchSignInMethodsForEmail(auth, email);
        if(!methods || methods.length===0){ throw new Error('Email not registered'); }

        const actionCodeSettings = {
          url: window.location.origin + '/reset_password.html',
          handleCodeInApp: true
        };

        await sendPasswordResetEmail(auth, email, actionCodeSettings);
        showStatus('Password reset email sent. Check your inbox (and spam).', 'success');
      }catch(e){ console.error(e); showStatus(e.message || 'Failed to send reset email','error'); }
      finally{ btn.disabled = false; btn.innerText = 'Send reset email'; }
    });

    // Help button shows quick troubleshooting steps
    document.getElementById('btn-help').addEventListener('click', ()=>{
      clearStatus();
      showStatus('Troubleshooting: 1) Serve files over HTTP (run: `python -m http.server` in frontend folder). 2) Ensure your Firebase Console has your local origin added to Authorized domains (e.g., http://127.0.0.1). 3) Check spam folder.', 'info');
    });
  </script>
</body>
</html>
