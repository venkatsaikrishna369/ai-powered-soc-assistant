<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Set New Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>body{background:#0f172a;color:#e2e8f0;padding:20px;font-family:Segoe UI,system-ui;} .card{max-width:520px;margin:40px auto;padding:24px;border-radius:12px;background:rgba(15,23,42,0.9);border:1px solid #334155}</style>
</head>
<body>
  <div class="card">
    <h3>Set a new password</h3>
    <p class="text-muted">Enter a new password for your account.</p>
    <div>
      <label class="form-label">New password</label>
      <input id="new-pass" type="password" class="form-control" placeholder="New password">
      <div style="height:8px"></div>
      <label class="form-label">Confirm password</label>
      <input id="confirm-pass" type="password" class="form-control" placeholder="Confirm password">
      <div style="height:10px"></div>
      <button id="btn-reset" class="btn btn-primary">Set password</button>
    </div>
    <div id="status" style="margin-top:12px;display:none"></div>
    <div style="margin-top:12px"><a href="login.html">Back to login</a></div>
  </div>

  <script type="importmap">
    {"imports": {"firebase/app":"https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js","firebase/auth":"https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js"}}
  </script>
  <script type="module">
    import { initializeApp } from 'firebase/app';
    import { getAuth, verifyPasswordResetCode, confirmPasswordReset, signInWithEmailAndPassword } from 'firebase/auth';

    const firebaseConfig = {
      apiKey: "AIzaSyD4Nhmq0DlMnIuG6oWOfoTAnUeWN37Ym74",
      authDomain: "newapp-f2106.firebaseapp.com",
      projectId: "newapp-f2106",
      storageBucket: "newapp-f2106.appspot.com",
      messagingSenderId: "372249829739",
      appId: "1:372249829739:web:98d193f53370ef52002c2e",
      measurementId: "G-QXF0B0VMGN",
      databaseURL: "https://newapp-f2106-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const statusEl = document.getElementById('status');
    function showStatus(msg, kind='info'){
      statusEl.style.display='block';
      statusEl.innerText = msg;
      statusEl.className = (kind==='error')? 'text-danger': (kind==='success')? 'text-success':'text-muted';
    }
    function clearStatus(){ statusEl.style.display='none'; statusEl.innerText=''; }

    // Read URL params for oobCode
    const params = new URLSearchParams(window.location.search);
    const oobCode = params.get('oobCode') || params.get('oobcode') || params.get('code');

    if (!oobCode) {
      showStatus('Reset link appears invalid. Use the password reset email link.', 'error');
      document.getElementById('btn-reset').disabled = true;
    }

    // Optionally verify code and email (to show info), but we proceed to accept new password
    document.getElementById('btn-reset').addEventListener('click', async ()=>{
      clearStatus(); const p1 = document.getElementById('new-pass').value; const p2 = document.getElementById('confirm-pass').value;
      if(!p1||!p2){ showStatus('Enter and confirm password','error'); return; }
      if(p1!==p2){ showStatus('Passwords do not match','error'); return; }
      if(p1.length<6){ showStatus('Password must be at least 6 characters','error'); return; }
      try{
        showStatus('Setting new password...');
        await confirmPasswordReset(auth, oobCode, p1);
        showStatus('Password updated. You may now sign in.', 'success');
        // Optionally sign in automatically: need email from verifyPasswordResetCode
        // Attempt to get email, then sign in
        try{
          const email = await verifyPasswordResetCode(auth, oobCode);
          await signInWithEmailAndPassword(auth, email, p1);
          window.location.href = 'dashboard.html';
        }catch(e){
          // if auto sign-in fails, just show success message
          console.warn('Auto sign-in failed', e);
        }
      }catch(e){ console.error(e); showStatus(e.message || 'Failed to reset password','error'); }
    });
  </script>
</body>
</html>
