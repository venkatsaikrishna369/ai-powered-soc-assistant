<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts - Security Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3a0ca3;
            --danger: #f72585;
            --warning: #f8961e;
            --success: #4cc9f0;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }
        
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .severity-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .severity-critical { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .severity-high { background: linear-gradient(135deg, #f97316, #ea580c); }
        .severity-medium { background: linear-gradient(135deg, #eab308, #ca8a04); }
        .severity-low { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        .severity-info { background: linear-gradient(135deg, #6b7280, #4b5563); }
        
        .alert-card {
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 4px solid var(--primary);
        }
        
        .alert-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }
        
        .mitre-badge {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #93c5fd;
            font-size: 0.7rem;
        }
        
        .nav-link {
            color: #94a3b8;
        }
        
        .nav-link.active {
            color: #ffffff;
            background: transparent;
            border-bottom: 3px solid var(--primary);
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark glass-card mb-4">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="/"> <!-- CHANGED: href="/" -->
                <div class="bg-primary rounded-circle p-2 me-3">
                    <i class="bi bi-shield-shaded text-white"></i>
                </div>
                <div>
                    <h4 class="mb-0 fw-bold">ALERTS</h4>
                    <small class="text-muted"> Security Incident Management</small>
                </div>
            </a>
            
            <div class="d-flex align-items-center">
                <!-- CHANGED: href="/" -->
                <a href="/" class="btn btn-outline-light btn-sm me-3">
                    <i class="bi bi-arrow-left me-2"></i>Back to Dashboard
                </a>
                <button class="btn btn-danger btn-sm" onclick="clearAllAlerts()">
                    <i class="bi bi-trash me-2"></i>Clear All
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container-fluid">
        <!-- Filter Bar -->
        <div class="glass-card p-3 mb-4">
            <div class="row align-items-center">
                <div class="col-md-4">
                    <h5 class="mb-0">
                        <i class="bi bi-bell me-2"></i>
                        Security Alerts
                        <span class="badge bg-danger ms-2" id="totalAlertCount">0</span>
                    </h5>
                </div>
                <div class="col-md-8">
                    <div class="btn-group btn-group-sm float-end">
                        <button class="btn btn-outline-secondary alert-filter active" data-severity="all">
                            All
                        </button>
                        <button class="btn btn-outline-danger alert-filter" data-severity="critical">
                            Critical
                        </button>
                        <button class="btn btn-outline-warning alert-filter" data-severity="high">
                            High
                        </button>
                        <button class="btn btn-outline-warning alert-filter" data-severity="medium">
                            Medium
                        </button>
                        <button class="btn btn-outline-info alert-filter" data-severity="low">
                            Low
                        </button>
                        <button class="btn btn-outline-secondary alert-filter" data-severity="info">
                            Info
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Alerts Grid -->
        <div class="row" id="alertsContainer">
            <!-- Alerts will be loaded here -->
        </div>

        <!-- Loading Indicator -->
        <div id="loadingIndicator" class="text-center mt-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 text-muted">Loading security alerts...</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- CHANGED: Added / before js/alerts.js -->
    <script src="/js/alerts.js"></script>
    <script>
        // Hide loading indicator after load
        setTimeout(() => {
            document.getElementById('loadingIndicator').style.display = 'none';
        }, 1000);
    </script>
</body>
</html>
